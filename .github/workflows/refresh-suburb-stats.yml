name: Refresh NSW suburb stats

# 每月 1 号 02:00 UTC（悉尼时间下午 12-1 点）跑一次，从 NSW Valuer General 拉最新 PSI
# 也可以手动触发
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build suburb stats
        run: node scripts/build-suburb-stats.mjs
      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if [[ -n "$(git status --porcelain src/data/suburb-stats.json)" ]]; then
            git add src/data/suburb-stats.json
            git commit -m "chore: refresh NSW suburb stats $(date -u +%Y-%m-%d)"
            git push origin main
          else
            echo "No changes to suburb stats"
          fi
