name: Refresh NSW suburb stats

# 每月 1 号 02:00 UTC（悉尼时间下午 12-1 点）跑一次，从 NSW Valuer General 拉最新 PSI
# 也可以手动触发
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Cache PSI yearly zips (~10 × 100MB)
        uses: actions/cache@v4
        with:
          path: .psi-cache
          key: psi-cache-${{ github.run_id }}
          restore-keys: psi-cache-
      - name: Build suburb stats
        env:
          YEARS_BACK: '10'
        run: node scripts/build-suburb-stats.mjs
      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          DATA_FILES="src/data/suburb-stats.json src/data/building-history.json src/data/property-history.json"
          if [[ -n "$(git status --porcelain $DATA_FILES)" ]]; then
            git add $DATA_FILES
            git commit -m "chore: refresh NSW suburb stats $(date -u +%Y-%m-%d)"
            git push origin main
          else
            echo "No changes to NSW data files"
          fi
